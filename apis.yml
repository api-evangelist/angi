apis:
- aid: angi:angi-leads-delivery-api
  name: Angi Leads Delivery (Webhook) API
  tags:
  - Leads
  - Webhooks
  - Lead Generation
  - Partner Integration
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://intercom.help/angi/en/articles/10288125-setting-up-api-integration-with-angi
  baseURL: https://www.angi.com
  properties:
  - url: https://intercom.help/angi/en/collections/12900573-api-integrations
    type: Documentation
  - url: https://intercom.help/angi/en/articles/10288125-setting-up-api-integration-with-angi
    type: APIReference
  description: Not a self-serve public API - there is no published base URL, API
    reference, or API key signup. Once a pro or CRM partner is approved by an Angi
    Ads Client Success Manager, Angi Ads/Angi Leads pushes each new homeowner lead
    as a JSON POST to a webhook URL the partner's CRM supplies, authenticated with
    an X-API-KEY header. Angi documents the lead field list in its help center and
    also supports connecting via Zapier for CRMs without a native integration.
    Verified integrations exist for ServiceTitan, Jobber, SmartMoving, ActiveProspect,
    and Smith.ai.
- aid: angi:angi-pro-account-linking
  name: Angi Pro Account Linking (Sign in with Angi)
  tags:
  - OAuth
  - Account Linking
  - CRM Integration
  - Partner
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://help.servicetitan.com/docs/angi-leads-integration
  baseURL: https://www.angi.com
  properties:
  - url: https://help.servicetitan.com/docs/angi-leads-integration
    type: Documentation
  description: An OAuth-style "Sign in with Angi" account-linking flow used by a
    short, approved list of CRM and field-service management partners (ServiceTitan,
    Jobber) to connect a pro's Angi account and receive account, profile, and lead/
    booking data into the partner platform's native booking screen. No public
    client-registration process, scope list, or token-endpoint documentation is
    published; access is arranged directly between Angi and the partner.
