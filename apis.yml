name: Angi
kind: company
description: >-
  Angi (formerly Angie's List, founded 1995) is a digital home services
  marketplace connecting homeowners with home service professionals for repair,
  maintenance, and improvement projects. Angie's List merged with IAC's HomeAdvisor
  in 2017 under parent ANGI Homeservices Inc.; in March 2021 the consumer brand and
  parent company were both renamed Angi, with HomeAdvisor continuing as the
  pro-facing "Angi Leads" lead-generation business. IAC fully spun off its stake
  in April 2025, making Angi Inc. (NASDAQ: ANGI) an independent public company.
  Angi does not operate a self-serve public developer portal or publish an API
  reference. It does offer a gated, partner-only lead-delivery mechanism: Angi
  Ads/Angi Leads pushes new homeowner leads as JSON to a webhook URL a pro's CRM
  provides (authenticated with an X-API-KEY header), and an OAuth-style "Sign in
  with Angi" account-linking flow used by a short list of approved CRM/field-service
  partners (ServiceTitan, Jobber) to receive lead and booking data. Both require a
  direct arrangement with an Angi Ads Client Success Manager rather than self-serve
  API keys.
